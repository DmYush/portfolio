<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playables Gallery</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #171b22;
        --text: #f2f5f9;
        --muted: #a8b0bf;
        --accent: #67f08c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 32px 24px 16px;
        max-width: 1100px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .card {
        background: var(--panel);
        border-radius: 16px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 180px;
        border: 1px solid #252c36;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }

      .card h2 {
        margin: 0;
        font-size: 18px;
      }

      .card p {
        font-size: 14px;
        line-height: 1.4;
      }

      .card a {
        margin-top: auto;
        color: #0f1115;
        background: var(--accent);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 999px;
        text-align: center;
        font-weight: 600;
      }

      footer {
        padding: 24px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Playables Gallery</h1>
      <p>Здесь будут креативы в формате HTML5-плееблов.</p>
    </header>

    <main>
      <article class="card">
        <h2>Shelter</h2>
        <p>Прототип: стройка бункера, физика, drag&drop деталей.</p>
        <a href="playables/shelter/">Открыть</a>
      </article>

      <article class="card">
        <h2>Пример плейбла</h2>
        <p>Замените описание и ссылку на свой проект.</p>
        <a href="playables/example/">Открыть</a>
      </article>
    </main>

    <footer>Обновлено: добавьте новые карточки в index.html</footer>
  </body>
</html>
