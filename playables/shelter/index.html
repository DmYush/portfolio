<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cocos Creator | Shelter</title>
  <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="x5-page-mode" content="app">
  <link rel="stylesheet" type="text/css" href="style.css"/>
  <link rel="stylesheet" type="text/css" href="splash.css"/>
  <link rel="preload" as="image" href="splash/bg.webp" type="image/webp" fetchpriority="high"/>
  <link rel="preload" as="image" href="splash/logo.png"/>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       CUSTOM SPLASH / LOADER
       Удаляется из TypeScript через SplashRemover.ts
       ═══════════════════════════════════════════════════ -->
  <div class="shelter-loader">

    <div class="shelter-loader__bg">
      <img src="splash/bg.webp" alt="" fetchpriority="high" decoding="async"/>
    </div>

    <div class="shelter-loader__logo">
      <img src="splash/logo.png" alt="Bombidler"/>
    </div>

    <div class="shelter-loader__bar-wrap">
      <div class="shelter-loader__bar-track">
        <img class="shelter-loader__bar-track-img" src="splash/bar_track.png" alt=""/>
        <div class="shelter-loader__bar-clip" id="bar-clip">
          <img class="shelter-loader__bar-fill-img" id="bar-fill" src="splash/bar_fill.png" alt=""/>
        </div>
      </div>
    </div>

  </div>
  <!-- /CUSTOM SPLASH -->

  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
    </div>
  </div>

  <script src="splash-bar.js"></script>
  <script>
    (function () {
      initShelterSplashBar({ speed: 0.045, maxFake: 85 });

      window.hideShelterLoader = function () {
        var loader = document.querySelector('.shelter-loader');
        if (!loader) return;
        loader.style.transition = 'opacity 0.45s ease';
        loader.style.opacity    = '0';
        setTimeout(function () {
          if (loader.parentNode) loader.parentNode.removeChild(loader);
        }, 480);
      };
    })();
  </script>

<!-- Polyfills bundle. -->
<script src="src/polyfills.bundle.js" charset="utf-8"> </script>

<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').then(function () {
      // Fallback: если TS-бандл старый и не вызвал hideShelterLoader
      setTimeout(function () {
        var loader = document.querySelector('.shelter-loader');
        if (!loader || loader.style.opacity === '0') return;
        if (typeof window.setShelterProgress === 'function') window.setShelterProgress(100);
        setTimeout(function () {
          if (typeof window.hideShelterLoader === 'function') window.hideShelterLoader();
        }, 200);
      }, 2500);
    }).catch(function (err) { console.error(err); });
</script>

</body>
</html>
