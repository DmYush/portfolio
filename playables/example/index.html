<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playable Example</title>
    <style>
      :root {
        --bg: #0b0e13;
        --accent: #5bc0ff;
        --text: #e8eef6;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .panel {
        text-align: center;
        max-width: 420px;
        padding: 32px;
        border-radius: 20px;
        border: 1px solid #1c2632;
        background: #121722;
      }

      button {
        margin-top: 16px;
        background: var(--accent);
        color: #0b0e13;
        border: none;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Playable Example</h1>
      <p>Замените этот файл на свой HTML5-плеебл.</p>
      <button onclick="alert('Готово!')">Проверка</button>
    </div>
  </body>
</html>
